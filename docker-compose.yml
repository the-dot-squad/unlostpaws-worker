# ==============================================================================
# Docker Compose — CPU Vision Worker
# ==============================================================================
# Starts ONE worker container using the CPU image (PyTorch + ONNX Runtime CPU).
#
# Usage:
#   cp .env.example .env    # edit REDIS_URL
#   docker compose up -d
#
# Do NOT combine this file with docker-compose.gpu.yml — pick one compose file
# for the hardware you are deploying on.
# ==============================================================================

services:
  vision-worker:
    # Pre-built CPU image from GHCR. Pin a release with :v1.0.0 (GPU uses :v1.0.0-gpu).
    image: ghcr.io/the-dot-squad/unlostpaws-worker:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    env_file:
      - .env

    environment:
      WORKER_IMAGE_VARIANT: cpu

    extra_hosts:
      # Lets the container reach Redis / Next.js running on the host machine.
      - "host.docker.internal:host-gateway"

    volumes:
      # Persist downloaded Hugging Face model weights across restarts.
      - hf-cache:/app/.cache/huggingface

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "app/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

volumes:
  hf-cache:
