name: Export ONNX Models

concurrency:
  group: export-models-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    paths:
      - "app/models/manifest.json"
      - "tools/export.py"
      - "tools/validate.py"
      - ".github/workflows/export-models.yml"

jobs:
  export-and-validate:
    name: Export and validate ONNX artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-torch.txt
          pip install pillow

      - name: Export models to ONNX
        run: python -m tools export --output /tmp/onnx-export

      - name: Validate ONNX accuracy vs PyTorch
        run: python -m tools validate --models-dir /tmp/onnx-export

      - name: Upload ONNX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: onnx-models
          path: /tmp/onnx-export
          retention-days: 14
