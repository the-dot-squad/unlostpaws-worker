name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check app/ tests/ tools/

      - name: Ruff format
        run: ruff format --check app/ tests/ tools/

      - name: Unit tests
        env:
          PYTHONPATH: .
        run: pytest

  docker:
    name: Docker (${{ matrix.variant }})
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            dockerfile: Dockerfile
            flavor_suffix: ""
            rolling_tag: latest
            platforms: linux/amd64,linux/arm64
          - variant: gpu
            dockerfile: Dockerfile.gpu
            flavor_suffix: -gpu
            rolling_tag: latest
            platforms: linux/amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
            suffix=${{ matrix.flavor_suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=${{ matrix.rolling_tag }}

      - name: Set up QEMU
        if: matrix.platforms != 'linux/amd64'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: ${{ matrix.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

  release:
    name: GitHub Release
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get latest published release tag
        id: get_latest_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Query GitHub for the most recent non-draft, non-pre-release release tag, excluding the current version
          LATEST_TAG=$(gh release list --repo ${{ github.repository }} --exclude-drafts --exclude-pre-releases --json tagName --jq "[.[] | select(.tagName != \"${{ github.ref_name }}\")][0].tagName // empty" 2>/dev/null)
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          previous_tag: ${{ steps.get_latest_release.outputs.latest_tag }}
          body: |
            ## Docker images

            **CPU** (PyTorch CPU + ONNX Runtime CPU):
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ```

            **GPU** (NVIDIA CUDA — requires Container Toolkit):
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-gpu
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-gpu
            ```

            ### Quick start (CPU)
            ```bash
            docker run -d \
              --name unlostpaws-worker \
              --env-file .env \
              -v unlostpaws-hf-cache:/app/.cache/huggingface \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ### Quick start (GPU)
            ```bash
            docker run -d --gpus all \
              --name unlostpaws-worker \
              --env-file .env \
              -e VISION_PROFILE=gpu-standard \
              -e DEVICE=cuda \
              -v unlostpaws-hf-cache:/app/.cache/huggingface \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-gpu
            ```
