changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot[bot]
  categories:
    - title: "🚀 Features"
      labels:
        - "feature"
        - "enhancement"
    - title: "🐛 Bug Fixes"
      labels:
        - "bug"
        - "bugfix"
    - title: "📖 Documentation"
      labels:
        - "documentation"
        - "docs"
    - title: "🧰 Maintenance & CI"
      labels:
        - "maintenance"
        - "ci"
        - "chore"
        - "dependencies"
